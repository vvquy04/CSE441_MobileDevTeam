server:
  port: 8000

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/tluofficehours?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 10MB

app:
  jwt:
    secret: TLUOfficeHoursJWTSecretKey2025VeryLongSecretKeyForSecurity123456789
    expiration-ms: 86400000  # 24 hours
  base-url: http://10.0.2.2:8000
  upload-dir: ./uploads

logging:
  level:
    com.tlu.officehours: DEBUG
    org.springframework.security: DEBUG
